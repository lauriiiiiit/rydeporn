<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>RideVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #07090c;
  --bg-1: #0c1117;
  --bg-2: #131a22;
  --line: rgba(255,255,255,0.08);
  --line-strong: rgba(255,255,255,0.16);
  --fg: #e7ecf3;
  --fg-dim: #8a95a5;
  --fg-mute: #5a6470;
  --accent: #b6ff3c;
  --accent-soft: rgba(182,255,60,0.12);
  --accent-glow: rgba(182,255,60,0.45);
  --danger: #ff6a6a;
  --green: #b6ff3c;
  --red: #ff6a6a;
  --yellow: #ffb547;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Space Grotesk", system-ui, sans-serif;
  background: var(--bg-0);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100dvh;
}
/* ... (rest of your CSS remains unchanged) ... */
.section { display: none; }
.section.visible { display: block; }
#sec-login { height: 100dvh; overflow: hidden; }
#sec-connect, #sec-controls {
  min-height: 100dvh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.25rem 3rem;
}
#sec-connect.visible, #sec-controls.visible { display: flex; }

/* ... (rest of your CSS remains unchanged) ... */
</style>
</head>
<body>

<!-- ── Background (login only) ── -->
<div class="bg" id="bg" aria-hidden="true">
  <div class="orb"></div>
  <div class="bg-grid"></div>
  <div class="scooter-wrap" id="scooterWrap">
    <svg viewBox="0 0 1100 620" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.4">
      <line x1="0" y1="500" x2="1100" y2="500" stroke="rgba(255,255,255,0.08)"/>
      <circle cx="280" cy="470" r="80" stroke="#b6ff3c" stroke-width="2" opacity="0.25"/>
      <circle cx="280" cy="470" r="40" stroke="#b6ff3c" stroke-width="2" opacity="0.12"/>
      <circle cx="280" cy="470" r="6" fill="#fff" stroke="none"/>
      <circle cx="780" cy="470" r="80" stroke="#b6ff3c" stroke-width="2" opacity="0.25"/>
      <circle cx="780" cy="470" r="40" stroke="#b6ff3c" stroke-width="2" opacity="0.12"/>
      <circle cx="780" cy="470" r="6" fill="#fff" stroke="none"/>
      <path d="M 220 460 L 740 460 L 760 470 L 240 470 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)"/>
      <line x1="320" y1="460" x2="700" y2="460" stroke="rgba(182,255,60,0.5)" stroke-width="2"/>
      <path d="M 770 470 L 820 220 L 840 220 L 790 470 Z" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.22)"/>
      <line x1="760" y1="220" x2="900" y2="220" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="760" cy="220" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <circle cx="900" cy="220" r="6" fill="rgba(255,255,255,0.4)" stroke="none"/>
      <circle cx="830" cy="240" r="10" fill="rgba(182,255,60,0.5)" stroke="rgba(182,255,60,0.8)"/>
      <ellipse cx="280" cy="555" rx="100" ry="6" fill="rgba(182,255,60,0.08)" stroke="none"/>
      <ellipse cx="780" cy="555" rx="100" ry="6" fill="rgba(182,255,60,0.08)" stroke="none"/>
    </svg>
  </div>
  <div class="bg-scan"></div>
</div>

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="brand">
    <div class="brand-mark">R</div>
    <div class="brand-name">Ride<b>Vault</b></div>
  </div>
  <div class="top-right">
    <span><span class="status-dot"></span>SECURE · BLE</span>
    <span id="clock">00:00:00 UTC</span>
  </div>
</div>

<!-- ── CONNECT ── -->
<div class="section" id="sec-connect">
  <div class="ctrl-card">
    <div class="scooter-stage">
      <div class="scooter-ring"></div>
      <svg class="scooter-svg" width="200" height="120" viewBox="0 0 200 120" fill="none">
        <circle cx="38"  cy="92" r="22" stroke="#b6ff3c" stroke-width="2" opacity="0.25"/>
        <circle cx="38"  cy="92" r="16" stroke="#b6ff3c" stroke-width="2.5" opacity="0.55"/>
        <circle cx="38"  cy="92" r="6"  fill="#b6ff3c"   opacity="0.3"/>
        <circle cx="162" cy="92" r="22" stroke="#b6ff3c" stroke-width="2" opacity="0.25"/>
        <circle cx="162" cy="92" r="16" stroke="#b6ff3c" stroke-width="2.5"/>
        <circle cx="162" cy="92" r="6"  fill="#b6ff3c"   opacity="0.3"/>
        <line x1="38" y1="76" x2="38" y2="108" stroke="#b6ff3c" stroke-width="1.2" opacity="0.3"/>
        <line x1="22" y1="92" x2="54" y2="92"  stroke="#b6ff3c" stroke-width="1.2" opacity="0.3"/>
        <line x1="162" y1="76" x2="162" y2="108" stroke="#b6ff3c" stroke-width="1.2" opacity="0.3"/>
        <line x1="146" y1="92" x2="178" y2="92"  stroke="#b6ff3c" stroke-width="1.2" opacity="0.3"/>
        <rect x="52" y="84" width="80" height="10" rx="5" fill="#1c1c22" stroke="#b6ff3c" stroke-width="1.8"/>
        <path d="M108 89 L130 48" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <line x1="130" y1="48" x2="148" y2="24" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <path d="M148 48 L162 76" stroke="#b6ff3c" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M130 48 L148 48" stroke="#b6ff3c" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="148" y1="24" x2="148" y2="14" stroke="#b6ff3c" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M138 14 L158 14" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <rect x="136" y="11" width="5" height="6" rx="2.5" fill="#b6ff3c"/>
        <rect x="159" y="11" width="5" height="6" rx="2.5" fill="#b6ff3c"/>
        <circle cx="162" cy="72" r="7" fill="#b6ff3c" opacity="0.2"/>
        <circle cx="162" cy="72" r="4" fill="#b6ff3c" opacity="0.7"/>
        <circle cx="162" cy="72" r="1.8" fill="white"/>
        <circle cx="38"  cy="80" r="3" fill="#b6ff3c" opacity="0.5"/>
      </svg>
      <div class="scooter-title-row">
        <div class="dot" id="conn-dot"></div>
        <div class="scooter-title" id="scooter-name">No scooter connected</div>
      </div>
      <div class="scooter-sub" id="conn-status">Ready to connect</div>
    </div>
    <div class="actions">
      <button class="btn btn-green" id="btn-connect" onclick="doConnect()" style="font-size:1rem;padding:0.95rem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
          <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="currentColor"/>
        </svg>
        Connect to scooter
      </button>
    </div>
  </div>
  <button class="btn-out" onclick="doLogout()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Sign out
  </button>
</div>

<!-- ── CONTROLS ── -->
<div class="section" id="sec-controls">
  <div class="ctrl-card">
    <div class="scooter-stage">
      <div class="scooter-ring"></div>
      <svg class="scooter-svg" width="200" height="120" viewBox="0 0 200 120" fill="none">
        <circle cx="38"  cy="92" r="22" stroke="#b6ff3c" stroke-width="2" opacity="0.35"/>
        <circle cx="38"  cy="92" r="16" stroke="#b6ff3c" stroke-width="2.5"/>
        <circle cx="38"  cy="92" r="6"  fill="#b6ff3c"   opacity="0.45"/>
        <circle cx="162" cy="92" r="22" stroke="#b6ff3c" stroke-width="2" opacity="0.35"/>
        <circle cx="162" cy="92" r="16" stroke="#b6ff3c" stroke-width="2.5"/>
        <circle cx="162" cy="92" r="6"  fill="#b6ff3c"   opacity="0.45"/>
        <line x1="38"  y1="76" x2="38"  y2="108" stroke="#b6ff3c" stroke-width="1.2" opacity="0.4"/>
        <line x1="22"  y1="92" x2="54"  y2="92"  stroke="#b6ff3c" stroke-width="1.2" opacity="0.4"/>
        <line x1="162" y1="76" x2="162" y2="108" stroke="#b6ff3c" stroke-width="1.2" opacity="0.4"/>
        <line x1="146" y1="92" x2="178" y2="92"  stroke="#b6ff3c" stroke-width="1.2" opacity="0.4"/>
        <rect x="52" y="84" width="80" height="10" rx="5" fill="#1c1c22" stroke="#b6ff3c" stroke-width="1.8"/>
        <path d="M108 89 L130 48" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <line x1="130" y1="48" x2="148" y2="24" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <path d="M148 48 L162 76" stroke="#b6ff3c" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M130 48 L148 48" stroke="#b6ff3c" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="148" y1="24" x2="148" y2="14" stroke="#b6ff3c" stroke-width="2.8" stroke-linecap="round"/>
        <path d="M138 14 L158 14" stroke="#b6ff3c" stroke-width="3" stroke-linecap="round"/>
        <rect x="136" y="11" width="5" height="6" rx="2.5" fill="#b6ff3c"/>
        <rect x="159" y="11" width="5" height="6" rx="2.5" fill="#b6ff3c"/>
        <circle cx="162" cy="72" r="7" fill="#b6ff3c" opacity="0.2"/>
        <circle cx="162" cy="72" r="4" fill="#b6ff3c" opacity="0.7"/>
        <circle cx="162" cy="72" r="1.8" fill="white"/>
        <circle cx="38"  cy="80" r="3" fill="#b6ff3c" opacity="0.5"/>
      </svg>
      <div class="scooter-title-row">
        <div class="dot live" id="ctrl-dot"></div>
        <div class="scooter-title" id="scooter-name-ctrl">Scooter</div>
      </div>
      <div class="scooter-sub" id="conn-status-ctrl">Connected</div>
    </div>

    <div class="bat-section" id="bat-section">
      <div class="bat-header">
        <span class="bat-label">Battery</span>
        <span class="bat-pct" id="bat-pct">–%</span>
      </div>
      <div class="bat-track"><div class="bat-fill" id="bat-fill" style="width:0%"></div></div>
    </div>

    <div class="status-bar">
      <span class="status-label" id="conn-status2">Connected</span>
      <button class="btn-refresh" onclick="doRefreshStatus()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Refresh
      </button>
    </div>

    <div class="actions">
      <div class="btn-row">
        <button class="btn btn-green" id="btn-unlock" onclick="doCommand('unlock')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
          </svg>
          Unlock
        </button>
        <button class="btn btn-flat" id="btn-lock" onclick="doCommand('lock')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Lock
        </button>
      </div>

      <div class="btn-row" id="btn-bat-row">
        <button class="btn btn-flat" onclick="doCommand('bat_unlock')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="16" height="10" rx="2"/>
            <path d="M22 11v2"/><line x1="6" y1="11" x2="12" y2="11"/>
          </svg>
          Open battery
        </button>
        <button class="btn btn-flat" onclick="doCommand('bat_lock')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="16" height="10" rx="2"/>
            <path d="M22 11v2"/>
          </svg>
          Close battery
        </button>
      </div>

      <div class="btn-row" style="margin-top:0.1rem">
        <button class="btn btn-ghost" onclick="doDisconnect()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Disconnect
        </button>
        <button class="btn btn-ghost" onclick="doLogout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Status pill ── -->
<button class="status-pill" id="statusPill" type="button">
  <span class="status-pill-dot"></span>
  <span id="statusPillLabel">Active</span>
  <span class="status-pill-meta" id="statusPing">– ms</span>
</button>

<div class="bat-pill" id="batPill">
  <span class="bat-pill-icon">
    <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
      <rect x="0.5" y="0.5" width="13" height="10" rx="2" stroke="currentColor" stroke-opacity="0.6"/>
      <rect id="batPillFillRect" x="2" y="2" width="9" height="7" rx="1" fill="currentColor"/>
      <path d="M14.5 3.5v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </span>
  <span class="bat-pill-pct" id="batPillPct">–%</span>
</div>

<div class="toast" id="toast"></div>
